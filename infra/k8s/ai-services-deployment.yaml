apiVersion: apps/v1
kind: Deployment
metadata:
  name: swyft-ai-services
spec:
  replicas: 3
  selector:
    matchLabels:
      app: swyft-ai-services
  template:
    metadata:
      labels:
        app: swyft-ai-services
    spec:
      containers:
        - name: ai-services
          image: swyft-ai-services:latest
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
---
apiVersion: v1
kind: Service
metadata:
  name: swyft-ai-services
spec:
  selector:
    app: swyft-ai-services
  ports:
    - port: 8000
      targetPort: 8000
